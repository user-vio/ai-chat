<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Chat</title>
  <style>
    /* Basit bir CSS tasarımı */
    body { font-family: sans-serif; margin: 0; padding: 0; background: #f4f4f9; }
    #topbar { background: #333; color: white; padding: 10px; text-align: center; }
    #chat { height: 300px; overflow-y: auto; padding: 20px; border-bottom: 1px solid #ccc; background: white; }
    #bar { padding: 10px; display: flex; }
    #msg { flex: 1; padding: 10px; font-size: 16px; }
    #send { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    .user-msg { color: blue; text-align: right; margin: 5px 0; }
  </style>
</head>
<body>
  <div id="topbar">
    <div id="mark"></div>
    <h1>AI Chat</h1>
    <span id="model-label">Modelleme: Canlı</span>
  </div>

  <div id="chat"></div>

  <div id="bar">
    <input id="msg" type="text" placeholder="Bir şeyler yaz…" autocomplete="off">
    <button id="send">Gönder</button>
  </div>

  <script>
    // JavaScript kodlarını buraya ekledik
    const msgInput = document.getElementById('msg');
    const sendBtn = document.getElementById('send');
    const chatArea = document.getElementById('chat');

    function mesajGonder() {
      const text = msgInput.value.trim();
      if (text !== "") {
        // Kullanıcı mesajını ekrana yazdır
        const msgDiv = document.createElement('div');
        msgDiv.className = 'user-msg';
        msgDiv.textContent = text;
        chatArea.appendChild(msgDiv);
        
        // Girdiyi temizle ve odaklan
        msgInput.value = "";
        msgInput.focus();
        
        // Chat alanını aşağı kaydır
        chatArea.scrollTop = chatArea.scrollHeight;
      }
    }

    // Butona tıklama olayı
    sendBtn.addEventListener('click', mesajGonder);

    // Enter tuşuna basınca gönderme olayı
    msgInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        mesajGonder();
      }
    });
  </script>
</body>
</html>
